<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ALIMCO AI Export Intelligence Dashboard</title>

<!-- CHART JS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

:root{
    --bg:#0f172a;
    --card:#111827;
    --border:rgba(255,255,255,0.08);
    --text:#ffffff;
    --muted:#94a3b8;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:Arial,sans-serif;
    overflow-x:hidden;
}

/* ───────────────────────────── */
/* HEADER */
/* ───────────────────────────── */

header{
    padding:24px 30px;
    background:#111827;
    border-bottom:1px solid var(--border);
}

header h1{
    font-size:30px;
    margin-bottom:8px;
}

header p{
    color:var(--muted);
    font-size:14px;
}

.last-updated-bar{
    display:flex;
    align-items:center;
    gap:10px;
    margin-top:12px;
    padding:10px 16px;
    background:rgba(34,211,160,0.08);
    border:1px solid rgba(34,211,160,0.25);
    border-radius:8px;
    width:fit-content;
}
.last-updated-bar .dot{
    width:8px;height:8px;border-radius:50%;
    background:#22d3a0;
    box-shadow:0 0 6px #22d3a0;
    animation:blink 2s infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.last-updated-bar span{
    font-size:13px;color:#22d3a0;font-weight:600;
}
.last-updated-bar small{
    font-size:12px;color:#94a3b8;margin-left:4px;
}

/* Leaflet dark popup */
.dark-popup .leaflet-popup-content-wrapper{
    background:#111827;border:1px solid #334155;border-radius:10px;padding:0;
}
.dark-popup .leaflet-popup-tip{ background:#111827; }
.dark-popup .leaflet-popup-content{ margin:0; }
.map-label .leaflet-tooltip-content{ background:transparent;border:none;box-shadow:none; }

/* ───────────────────────────── */
/* FILTERS */
/* ───────────────────────────── */

.topbar{
    padding:20px 30px;
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    border-bottom:1px solid var(--border);
}

select{
    background:#1e293b;
    border:1px solid var(--border);
    color:white;
    padding:10px 14px;
    border-radius:10px;
    min-width:180px;
}

/* ───────────────────────────── */
/* CONTAINER */
/* ───────────────────────────── */

.container{
    padding:30px;
}

.dashboard-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
}

/* ───────────────────────────── */
/* KPI */
/* ───────────────────────────── */

.kpi{
    background:var(--card);
    border-radius:18px;
    padding:24px;
    border:1px solid var(--border);
    transition:0.3s ease;
}

.kpi:hover{
    transform:translateY(-4px);
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

.kpi-label{
    color:var(--muted);
    font-size:13px;
    margin-bottom:12px;
    text-transform:uppercase;
}

.kpi-num{
    font-size:38px;
    font-weight:bold;
}

.kpi-sub{
    margin-top:10px;
    color:var(--muted);
    font-size:13px;
}

/* ───────────────────────────── */
/* CARDS */
/* ───────────────────────────── */

.chart-card{
    background:var(--card);
    border-radius:18px;
    padding:24px;
    border:1px solid var(--border);
    transition:0.3s ease;
}

.chart-card:hover{
    transform:translateY(-5px);
    box-shadow:0 10px 40px rgba(0,0,0,0.3);
}

.chart-title{
    font-size:22px;
    font-weight:bold;
}

.chart-sub{
    color:var(--muted);
    margin-top:6px;
    font-size:14px;
}

.span2{
    grid-column:span 2;
}

.span4{
    grid-column:span 4;
}

canvas{
    margin-top:20px !important;
}

/* FIX: chart-small constrains doughnut canvas size */
.chart-small{
    height:260px;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
}

/* ───────────────────────────── */
/* TABLE */
/* ───────────────────────────── */

.table-wrap{
    overflow:auto;
    margin-top:20px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#1e293b;
    padding:14px;
    text-align:left;
    color:var(--muted);
    font-size:13px;
}

td{
    padding:14px;
    border-top:1px solid var(--border);
    font-size:14px;
}

tr:hover{
    background:rgba(255,255,255,0.03);
}

/* ───────────────────────────── */
/* FOOTER */
/* ───────────────────────────── */

.footer{
    padding:20px 30px;
    color:var(--muted);
    font-size:13px;
}

/* ───────────────────────────── */
/* ERROR BANNER */
/* ───────────────────────────── */

.error-banner{
    background:#7f1d1d;
    color:#fca5a5;
    padding:14px 24px;
    font-size:14px;
    border-bottom:1px solid #991b1b;
    display:none;
}

/* ───────────────────────────── */
/* AI SIDEBAR */
/* ───────────────────────────── */

.ai-sidebar{
    position:fixed;
    top:0;
    right:0;
    width:420px;
    height:100vh;
    background:linear-gradient(180deg,#111827,#0f172a);
    border-left:1px solid rgba(255,255,255,0.08);
    z-index:9999;
    transform:translateX(100%);
    transition:0.4s ease;
    display:flex;
    flex-direction:column;
    box-shadow:-10px 0 40px rgba(0,0,0,0.4);
}

.ai-sidebar.open{
    transform:translateX(0);
}

.toggle-btn{
    position:fixed;
    top:20px;
    right:20px;
    z-index:10000;
    background:linear-gradient(90deg,#2563eb,#7c3aed);
    color:white;
    border:none;
    padding:14px 22px;
    border-radius:14px;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 10px 30px rgba(37,99,235,0.3);
}

.close-btn{
    background:none;
    border:none;
    color:white;
    font-size:20px;
    cursor:pointer;
}

.ai-sidebar-header{
    padding:24px;
    border-bottom:1px solid rgba(255,255,255,0.06);
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.sidebar-sub{
    color:#94a3b8;
    margin-top:5px;
    font-size:13px;
}

.ai-sidebar-content{
    flex:1;
    overflow:auto;
    padding:22px;
}

.ai-highlight-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:14px;
    margin-bottom:24px;
}

.highlight-card{
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.05);
    border-radius:16px;
    padding:18px;
    transition:0.3s;
}

.highlight-card:hover{
    transform:translateY(-4px);
    background:rgba(255,255,255,0.06);
}

.highlight-label{
    color:#94a3b8;
    font-size:11px;
    margin-bottom:10px;
}

.highlight-value{
    font-size:24px;
    font-weight:bold;
}

.ai-scroll{
    white-space:pre-wrap;
    line-height:1.9;
    color:#e2e8f0;
    font-size:15px;
}

/* ───────────────────────────── */
/* MOBILE */
/* ───────────────────────────── */

@media(max-width:1100px){
    .dashboard-grid{
        grid-template-columns:repeat(2,1fr);
    }
    .span2,.span4{
        grid-column:span 2;
    }
}

@media(max-width:700px){
    .dashboard-grid{
        grid-template-columns:1fr;
    }
    .span2,.span4{
        grid-column:span 1;
    }
    .topbar{
        flex-direction:column;
    }
    select{
        width:100%;
    }
    .ai-sidebar{
        width:100%;
    }
    .ai-highlight-grid{
        grid-template-columns:1fr;
    }
}

</style>

</head>

<body>

<!-- ERROR BANNER (shown on API failure) -->
<div id="errorBanner" class="error-banner"></div>

<header>
    <h1>ALIMCO AI Export Intelligence Dashboard</h1>
    <p>Live Export Analytics · Market Intelligence · Global Expansion Strategy</p>
    <div class="last-updated-bar">
        <div class="dot"></div>
        <span>Last Updated:</span>
        <span id="fileMtime">—</span>
        <small>· File: <span id="fileName">—</span></small>
    </div>
</header>

<div class="topbar">
    <select id="fCountry"><option value="">All Countries</option></select>
    <select id="fStatus"><option value="">All Status</option></select>
    <select id="fStage"><option value="">All Stages</option></select>
    <select id="fType"><option value="">All Types</option></select>
    <select id="fSource"><option value="">All Sources</option></select>
</div>

<div class="container">
    <div id="dashboard" class="dashboard-grid"></div>
</div>

<!-- FIX 1: AI sidebar HTML + toggle button were completely missing from the original -->
<button class="toggle-btn"
        onclick="document.querySelector('.ai-sidebar').classList.toggle('open')">
    🤖 AI Insights
</button>

<div class="ai-sidebar">
    <div class="ai-sidebar-header">
        <div>
            <div style="font-size:18px;font-weight:bold;">AI Insights</div>
            <div class="sidebar-sub">Powered by export intelligence</div>
        </div>
        <button class="close-btn"
                onclick="document.querySelector('.ai-sidebar').classList.remove('open')">✕</button>
    </div>
    <div class="ai-sidebar-content">
        <div class="ai-highlight-grid">
            <div class="highlight-card">
                <div class="highlight-label">TOP MARKET</div>
                <div class="highlight-value" id="topMarket">—</div>
            </div>
            <div class="highlight-card">
                <div class="highlight-label">CONVERSION</div>
                <div class="highlight-value" id="convRate">—</div>
            </div>
        </div>
        <!-- FIX 2: #aiInsights element was referenced in JS but never present in the HTML -->
        <div class="ai-scroll" id="aiInsights">Loading insights…</div>
    </div>
</div>

<script>

const API = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
    ? 'http://localhost:5000/api/leads'
    : '/api/leads';

// FIX 3: demo fallback data — charts now render even when the backend is offline
const DEMO_DATA = [
    {company:'MediCare Egypt',   country:'Egypt',       status:'Interested',  stage:'Proposal',   type:'Distributor', source:'Trade Fair', value_inr:1200000},
    {company:'Gulf Mobility',    country:'UAE',         status:'Negotiating', stage:'Demo Done',  type:'Direct',      source:'Embassy',    value_inr:3500000},
    {company:'Kenya Rehab Ltd',  country:'Kenya',       status:'Interested',  stage:'Initial',    type:'NGO',         source:'Website',    value_inr:900000},
    {company:'BanglaAid',        country:'Bangladesh',  status:'Hot Lead',    stage:'Proposal',   type:'Govt',        source:'Referral',   value_inr:2100000},
    {company:'NepaCare',         country:'Nepal',       status:'Cold',        stage:'Initial',    type:'Distributor', source:'Trade Fair', value_inr:450000},
    {company:'SriMed',           country:'Sri Lanka',   status:'Interested',  stage:'Demo Done',  type:'Direct',      source:'Website',    value_inr:1750000},
    {company:'Thai Wellness',    country:'Thailand',    status:'Negotiating', stage:'Proposal',   type:'Distributor', source:'Embassy',    value_inr:2800000},
    {company:'PhilHealth Sup',   country:'Philippines', status:'Hot Lead',    stage:'MOU Signed', type:'Govt',        source:'Referral',   value_inr:4200000},
    {company:'IranMed Co',       country:'Iran',        status:'Cold',        stage:'Initial',    type:'Direct',      source:'Trade Fair', value_inr:600000},
    {company:'EthioRehab',       country:'Ethiopia',    status:'Interested',  stage:'Demo Done',  type:'NGO',         source:'Website',    value_inr:1050000},
    {company:'TanzaCare',        country:'Tanzania',    status:'Negotiating', stage:'Proposal',   type:'Distributor', source:'Embassy',    value_inr:1900000},
    {company:'VinaHealth',       country:'Vietnam',     status:'Hot Lead',    stage:'MOU Signed', type:'Govt',        source:'Referral',   value_inr:3300000},
];

let allData      = [];
let filteredData = [];
window.aiInsights = '';

const chartInstances = {};

window.addEventListener('load', () => {
    loadData();
    ['fCountry','fStatus','fStage','fType','fSource'].forEach(id =>
        document.getElementById(id).addEventListener('change', applyFilters)
    );
});

async function loadData(){
    try {
        const response = await fetch(API + '?t=' + Date.now());
        if(!response.ok) throw new Error(`Server returned ${response.status} ${response.statusText}`);
        const json = await response.json();
        allData      = json.leads || [];
        filteredData = [...allData];
        window.aiInsights = json.ai_insights || 'No AI insights available.';
        document.getElementById('fileName') .textContent = json.meta?.file          || '—';
        document.getElementById('fileMtime').textContent = json.meta?.last_modified || '—';
    } catch(err) {
        const banner = document.getElementById('errorBanner');
        banner.textContent   = `⚠ Backend unreachable (${err.message}). Showing demo data.`;
        banner.style.display = 'block';
        allData      = DEMO_DATA;
        filteredData = [...allData];
        window.aiInsights =
            'Demo mode — connect the backend at localhost:5000 for live data.\n\n' +
            '• Top opportunity: Philippines (₹42 L pipeline)\n' +
            '• 4 leads in active negotiation or MOU stage\n' +
            '• Trade Fair remains the highest-volume lead source\n' +
            '• South-East Asia cluster shows strongest engagement\n' +
            '• Prioritise UAE and Thailand for Q3 closures';
        document.getElementById('fileName') .textContent = 'demo-data';
        document.getElementById('fileMtime').textContent = new Date().toLocaleString();
        console.warn('loadData fell back to demo data:', err);
    }
    populateFilters();
    renderDashboard();
}

function populateFilters(){
    const sets = { country:new Set(), status:new Set(), stage:new Set(), type:new Set(), source:new Set() };
    allData.forEach(r => {
        if(r.country) sets.country.add(r.country);
        if(r.status)  sets.status .add(r.status);
        if(r.stage)   sets.stage  .add(r.stage);
        if(r.type)    sets.type   .add(r.type);
        if(r.source)  sets.source .add(r.source);
    });
    fillSelect('fCountry', sets.country);
    fillSelect('fStatus',  sets.status);
    fillSelect('fStage',   sets.stage);
    fillSelect('fType',    sets.type);
    fillSelect('fSource',  sets.source);
}

function fillSelect(id, set){
    const el = document.getElementById(id);
    const first = el.options[0].text;
    el.innerHTML = `<option value="">${first}</option>`;
    [...set].sort().forEach(v => {
        const o = document.createElement('option');
        o.value = o.textContent = v;
        el.appendChild(o);
    });
}

function applyFilters(){
    const f = {
        country: document.getElementById('fCountry').value,
        status:  document.getElementById('fStatus') .value,
        stage:   document.getElementById('fStage')  .value,
        type:    document.getElementById('fType')   .value,
        source:  document.getElementById('fSource') .value,
    };
    filteredData = allData.filter(r =>
        (!f.country || r.country === f.country) &&
        (!f.status  || r.status  === f.status)  &&
        (!f.stage   || r.stage   === f.stage)   &&
        (!f.type    || r.type    === f.type)     &&
        (!f.source  || r.source  === f.source)
    );
    renderDashboard();
}

function destroyChart(id){
    if(chartInstances[id]){ chartInstances[id].destroy(); delete chartInstances[id]; }
}

function renderDashboard(){

    ['countryChart','statusChart','ordersChart','sourceChart'].forEach(destroyChart);

    const totalOrders   = filteredData.reduce((a,b) => a+(b.value_inr||0), 0);
    const countries     = new Set(filteredData.map(x=>x.country)).size;
    const interested    = filteredData.filter(x=>x.status==='Interested').length;
    const rejected      = filteredData.filter(x=>['Not Interested','Closed - Lost','Cold'].includes(x.status)).length;

    document.getElementById('dashboard').innerHTML = `

        <div class="kpi">
            <div class="kpi-label">Total Leads</div>
            <div class="kpi-num">${filteredData.length}</div>
        </div>

        <div class="kpi">
            <div class="kpi-label">Countries</div>
            <div class="kpi-num">${countries}</div>
        </div>

        <div class="kpi" style="border-top:2px solid #22d3a0">
            <div class="kpi-label">Orders Received Value</div>
            <div class="kpi-num" style="color:#22d3a0">₹${Math.round(totalOrders).toLocaleString()}</div>
        </div>

        <div class="kpi">
            <div class="kpi-label">Interested Leads</div>
            <div class="kpi-num">${interested}</div>
        </div>

        <div class="kpi" style="border-top:2px solid #f87171">
            <div class="kpi-label">Leads Rejected</div>
            <div class="kpi-num" style="color:#f87171">${rejected}</div>
        </div>

        <div class="chart-card span2">
            <div class="chart-title">Country Export Value</div>
            <canvas id="countryChart"></canvas>
        </div>

        <div class="chart-card span2">
            <div class="chart-title">Lead Status</div>
            <div class="chart-small">
                <canvas id="statusChart"></canvas>
            </div>
        </div>

        <div class="chart-card span2">
            <div class="chart-title">Orders Received by Country</div>
            <canvas id="ordersChart"></canvas>
        </div>

        <div class="chart-card span2">
            <div class="chart-title">Lead Sources</div>
            <div class="chart-small">
                <canvas id="sourceChart"></canvas>
            </div>
        </div>

        <div class="chart-card span4" style="padding:0;overflow:hidden">
            <div class="chart-title" style="padding:16px 20px 8px">Export Leads Map</div>
            <div id="leadsMap" style="height:420px;width:100%"></div>
        </div>

        <div class="chart-card span4">
            <div class="chart-title">Export Leads</div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Company</th><th>Country</th><th>Status</th><th>Stage</th><th>Value</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${filteredData.map(lead => `
                            <tr>
                                <td>${lead.company||'-'}</td>
                                <td>${lead.country||'-'}</td>
                                <td>${lead.status ||'-'}</td>
                                <td>${lead.stage  ||'-'}</td>
                                <td>₹${Math.round(lead.value_inr||0).toLocaleString()}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
        </div>
    `;

    // FIX 2 applied: #aiInsights now exists in the sidebar above — no more crash
    document.getElementById('aiInsights').innerText = window.aiInsights;

    // Sidebar highlight cards
    const totalsMap = {};
    filteredData.forEach(r => { const c=r.country||'?'; totalsMap[c]=(totalsMap[c]||0)+(r.value_inr||0); });
    const topCountry = Object.entries(totalsMap).sort((a,b)=>b[1]-a[1])[0]?.[0] || '—';
    const conversion = filteredData.length
        ? Math.round(filteredData.filter(x=>['Hot Lead','Negotiating','MOU Signed'].includes(x.status)).length / filteredData.length * 100) + '%'
        : '—';
    document.getElementById('topMarket').textContent = topCountry;
    document.getElementById('convRate') .textContent = conversion;

    renderCountryChart();
    renderStatusChart();
    renderOrdersChart();
    renderSourceChart();
    renderMap();
}

// Chart colour palette
const PALETTE = ['#2563eb','#7c3aed','#0891b2','#059669','#d97706','#dc2626','#db2777','#65a30d','#9333ea','#0284c7','#16a34a','#ea580c'];
const palette = n => Array.from({length:n},(_,i)=>PALETTE[i%PALETTE.length]);

// Shared options — bar / line
const chartOptions = {
    responsive: true,
    interaction:{ intersect:false, mode:'index' },
    animation:  { duration:1500 },
    plugins:{
        legend:  { labels:{ color:'white' } },
        tooltip: { enabled:true, backgroundColor:'#111827', titleColor:'white', bodyColor:'white', borderColor:'#2563eb', borderWidth:1 }
    },
    scales:{
        x:{ ticks:{ color:'white' }, grid:{ color:'rgba(255,255,255,0.05)' } },
        y:{ ticks:{ color:'white' }, grid:{ color:'rgba(255,255,255,0.05)' } }
    }
};

// Shared options — doughnut (no scales axis)
const doughnutOptions = {
    responsive:true, maintainAspectRatio:false,
    animation:{ duration:1500 },
    plugins:{
        legend:  { labels:{ color:'white' } },
        tooltip: { enabled:true, backgroundColor:'#111827', titleColor:'white', bodyColor:'white', borderColor:'#2563eb', borderWidth:1 }
    }
};

function sumBy(key, valKey){
    const t={};
    filteredData.forEach(r=>{ const v=r[key]||'Unknown'; t[v]=(t[v]||0)+(r[valKey]||0); });
    return t;
}
function countBy(key){
    const t={};
    filteredData.forEach(r=>{ const v=r[key]||'Unknown'; t[v]=(t[v]||0)+1; });
    return t;
}

function renderCountryChart(){
    const t = sumBy('country','value_inr');
    chartInstances['countryChart'] = new Chart(document.getElementById('countryChart'),{
        type:'bar',
        data:{ labels:Object.keys(t), datasets:[{ label:'Export Value (₹)', data:Object.values(t), backgroundColor:palette(Object.keys(t).length), borderRadius:6, borderWidth:0 }] },
        options:chartOptions
    });
}

function renderStatusChart(){
    const t = countBy('status');
    chartInstances['statusChart'] = new Chart(document.getElementById('statusChart'),{
        type:'doughnut',
        data:{ labels:Object.keys(t), datasets:[{ data:Object.values(t), backgroundColor:palette(Object.keys(t).length), cutout:'70%' }] },
        options:{ ...doughnutOptions, radius:'60%' }
    });
}

function renderSourceChart(){
    const t = countBy('source');
    chartInstances['sourceChart'] = new Chart(document.getElementById('sourceChart'),{
        type:'doughnut',
        data:{ labels:Object.keys(t), datasets:[{ data:Object.values(t), backgroundColor:palette(Object.keys(t).length), cutout:'70%' }] },
        options:{ ...doughnutOptions, radius:'70%' }
    });
}

function renderOrdersChart(){
    const t = sumBy('country','value_inr');
    chartInstances['ordersChart'] = new Chart(document.getElementById('ordersChart'),{
        type:'line',
        data:{ labels:Object.keys(t), datasets:[{ label:'Orders Received (₹)', data:Object.values(t), tension:0.4, borderColor:'#22d3a0', backgroundColor:'rgba(34,211,160,0.12)', fill:true, pointBackgroundColor:'#22d3a0', pointRadius:5 }] },
        options:chartOptions
    });
}

// ── CITY COORDINATES (populated by server, fallback table for known cities) ──
const CITY_COORDS = {
    'zambia':       { lat:-15.4166, lng:28.2833, city:'Lusaka' },
    'nigeria':      { lat:6.5244,  lng:3.3792,  city:'Lagos' },
    'bangladesh':   { lat:23.8103, lng:90.4125,  city:'Dhaka' },
    'togo':         { lat:6.1374,  lng:1.2123,   city:'Lomé' },

let leafletMap = null;

function renderMap(){
    // Load Leaflet if not loaded yet
    if(!window.L){
        const link = document.createElement('link');
        link.rel='stylesheet'; link.href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
        document.head.appendChild(link);
        const script = document.createElement('script');
        script.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
        script.onload = () => _buildMap();
        document.head.appendChild(script);
    } else {
        _buildMap();
    }
}

function _buildMap(){
    const el = document.getElementById('leadsMap');
    if(!el) return;

    // Destroy old map if exists
    if(leafletMap){ leafletMap.remove(); leafletMap = null; }

    leafletMap = L.map('leadsMap', { zoomControl:true }).setView([20, 30], 2);

    // Dark tile layer
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
        subdomains:'abcd', maxZoom:19
    }).addTo(leafletMap);

    // Status → pin colour
    const statusColor = s => {
        if(!s) return '#94a3b8';
        s = s.toLowerCase();
        if(s.includes('negotiat'))       return '#60a5fa';
        if(s.includes('interest'))       return '#22d3a0';
        if(s.includes('reply') || s.includes('proposal')) return '#fb923c';
        if(s.includes('not') || s.includes('cold') || s.includes('lost')) return '#f87171';
        if(s.includes('hot') || s.includes('mou'))  return '#facc15';
        return '#a78bfa';
    };

    // Group leads by country for aggregation
    const byCountry = {};
    filteredData.forEach(r => {
        const key = (r.country||'').toLowerCase().trim();
        if(!byCountry[key]) byCountry[key] = [];
        byCountry[key].push(r);
    });

    Object.entries(byCountry).forEach(([key, leads]) => {
        // Use server coords if available, else lookup table
        let coords = null;
        if(leads[0].lat && leads[0].lng){
            coords = { lat: leads[0].lat, lng: leads[0].lng, city: leads[0].city || leads[0].country };
        } else {
            coords = CITY_COORDS[key] || CITY_COORDS[key.split(' ')[0]];
        }
        if(!coords) return;

        const topLead   = leads.sort((a,b)=>(b.value_inr||0)-(a.value_inr||0))[0];
        const totalVal  = leads.reduce((s,l)=>s+(l.value_inr||0),0);
        const color     = statusColor(topLead.status);
        const radius    = Math.max(8, Math.min(22, 8 + Math.log10((totalVal||1)+1) * 3));

        const circle = L.circleMarker([coords.lat, coords.lng], {
            radius, color: color, fillColor: color,
            fillOpacity: 0.85, weight: 2, opacity: 1
        }).addTo(leafletMap);

        const popupRows = leads.map(l =>
            `<tr style="border-bottom:1px solid #334155">
                <td style="padding:4px 8px;font-weight:600">${l.company||'—'}</td>
                <td style="padding:4px 8px"><span style="background:${statusColor(l.status)}22;color:${statusColor(l.status)};border-radius:4px;padding:1px 6px;font-size:11px">${l.status||'—'}</span></td>
                <td style="padding:4px 8px;color:#22d3a0">${l.value_inr>0?'₹'+Math.round(l.value_inr).toLocaleString('en-IN'):'—'}</td>
            </tr>`
        ).join('');

        circle.bindPopup(`
            <div style="font-family:Arial;min-width:280px;background:#111827;border-radius:8px;overflow:hidden">
                <div style="background:#1e293b;padding:10px 14px;border-bottom:1px solid #334155">
                    <strong style="font-size:14px;color:#fff">📍 ${coords.city || leads[0].country}</strong>
                    <span style="float:right;color:#94a3b8;font-size:12px">${leads.length} lead${leads.length>1?'s':''}</span>
                </div>
                <table style="width:100%;color:#e2e8f0;font-size:12px">${popupRows}</table>
                ${totalVal>0?`<div style="padding:8px 14px;background:#0f172a;font-size:12px;color:#22d3a0;text-align:right;border-top:1px solid #334155">Total: ₹${Math.round(totalVal).toLocaleString('en-IN')}</div>`:''}
            </div>`, { maxWidth:340, className:'dark-popup' }
        );

        // City label
        L.tooltip({ permanent:true, direction:'top', className:'map-label', offset:[0,-radius] })
         .setContent(`<span style="font-size:10px;color:#fff;background:rgba(0,0,0,0.6);padding:1px 5px;border-radius:3px">${leads[0].country}</span>`)
         .setLatLng([coords.lat, coords.lng])
         .addTo(leafletMap);
    });
}
